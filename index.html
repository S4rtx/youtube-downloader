<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <meta name="theme-color" content="#ff0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="YT Downloader">
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 10vh; background-color: #f9f9f9; }
        .container { max-width: 400px; margin: auto; padding: 30px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; }
        input, select, button { padding: 14px; margin: 10px 0; width: 90%; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; background-color: #ff0000; color: white; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #cc0000; }
        
        /* The box that will hold the final download buttons */
        #widget-container { margin-top: 25px; width: 100%; height: 100px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 YT Downloader</h1>
        <p>Paste your link and hit download.</p>

        <input type="text" id="url" placeholder="Paste YouTube URL here" required>
        
        <select id="format">
            <option value="videos">Video (MP4)</option>
            <option value="mp3">Audio (MP3)</option>
        </select>
        
        <button onclick="downloadMedia()">Get Download Link</button>

        <div id="widget-container"></div>
    </div>

    <script>
        // Function to extract the 11-character Video ID from any YouTube link
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|shorts\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function downloadMedia() {
            const urlInput = document.getElementById('url').value.trim();
            const format = document.getElementById('format').value;
            const widgetContainer = document.getElementById('widget-container');

            // Get the ID
            const videoId = extractVideoID(urlInput);

            if (!videoId) {
                widgetContainer.innerHTML = "<span style='color:red;'>Invalid YouTube Link. Please try again.</span>";
                return;
            }

            // Show a loading message
            widgetContainer.innerHTML = "<span style='color:gray;'>Connecting to server...</span>";

            // Generate the secure API iframe using the extracted Video ID
            const iframeUrl = `https://api.vevioz.com/@api/button/${format}/${videoId}`;
            
            // Insert the iframe onto the page
            setTimeout(() => {
                widgetContainer.innerHTML = `<iframe style="width:100%; height:100%; border:0; overflow:hidden;" scrolling="no" src="${iframeUrl}"></iframe>`;
            }, 600);
        }
    </script>
</body>
</html>
