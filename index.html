<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader</title>
    <meta name="theme-color" content="#ff0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="YT Downloader">
    
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 10vh; background-color: #f9f9f9; }
        .container { max-width: 400px; margin: auto; padding: 30px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; }
        input, select, button { padding: 14px; margin: 10px 0; width: 90%; font-size: 16px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { cursor: pointer; background-color: #ff0000; color: white; border: none; font-weight: bold; transition: 0.2s; }
        button:hover { background-color: #cc0000; }
        
        /* This box will hold the download button generated by the API */
        #widget-container { margin-top: 20px; width: 100%; height: 80px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎬 YT Downloader</h1>
        <p>Paste your link and hit download.</p>

        <input type="text" id="url" placeholder="Paste YouTube URL here" required>
        
        <select id="format">
            <option value="1080">Video (1080p)</option>
            <option value="720">Video (720p)</option>
            <option value="mp3">Audio (MP3)</option>
        </select>
        
        <button onclick="generateDownloadWidget()">Get Link</button>

        <div id="widget-container"></div>
    </div>

    <script>
        function generateDownloadWidget() {
            const urlInput = document.getElementById('url').value.trim();
            const format = document.getElementById('format').value;
            const widgetContainer = document.getElementById('widget-container');

            if (!urlInput) {
                widgetContainer.innerHTML = "<span style='color:red;'>Please enter a valid URL.</span>";
                return;
            }

            // Temporarily show a loading message
            widgetContainer.innerHTML = "<span>Loading your secure download link...</span>";

            // Encode the URL so it can be safely passed to the API
            const encodedUrl = encodeURIComponent(urlInput);

            // Create the iframe pointing to the Loader.to API
            const iframeUrl = `https://loader.to/api/button/?url=${encodedUrl}&f=${format}`;
            
            // Insert the iframe into the webpage after a tiny delay
            setTimeout(() => {
                widgetContainer.innerHTML = `<iframe style="width:100%; height:60px; border:0; overflow:hidden;" scrolling="no" src="${iframeUrl}"></iframe>`;
            }, 500);
        }
    </script>
</body>
</html>
